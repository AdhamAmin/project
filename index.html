<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital Dice | Verilog Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --seg-on:   #F85525;
  --seg-off:  #EDE8FA;
  --seg-glow: rgba(248,85,37,0.38);
  --purple:   #5B21B6;
  --purple-2: #7C3AED;
  --purple-3: #9333EA;
  --pink:     #EC4899;
  --orange:   #F85525;
  --amber:    #F59E0B;
  --bg:       #F0EEFF;
  --card:     #FFFFFF;
  --surface:  #F7F4FF;
  --border:   rgba(107,70,193,0.10);
  --text:     #1C1626;
  --muted:    #8B7FAB;
  --shadow-sm: 0 2px 8px rgba(91,33,182,0.07);
  --shadow-md: 0 8px 32px rgba(91,33,182,0.10);
  --shadow-lg: 0 24px 64px rgba(91,33,182,0.12);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

html {
  overflow-x: hidden;
  max-width: 100vw;
}

body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  padding: 24px;
  overflow-x: hidden;
  max-width: 100vw;
  position: relative;
}

.blob {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
  animation: drift 12s ease-in-out infinite alternate;
}
.blob-1 { width:500px;height:500px;background:rgba(167,139,250,0.22);top:-160px;left:-160px; }
.blob-2 { width:360px;height:360px;background:rgba(248,85,37,0.13);bottom:-80px;right:-80px;animation-delay:-5s; }
.blob-3 { width:260px;height:260px;background:rgba(236,72,153,0.12);top:40%;right:5%;animation-delay:-9s; }

@keyframes drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(24px,16px) scale(1.06); }
}

.card {
  position: relative; z-index: 1;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 36px;
  padding: 40px 44px 36px;
  max-width: 760px; width: 100%;
  box-shadow: var(--shadow-sm),var(--shadow-md),var(--shadow-lg),0 0 0 1px rgba(107,70,193,0.06);
  animation: riseIn 0.75s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes riseIn {
  from { opacity:0; transform:translateY(28px) scale(0.97); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 48px; right: 48px; height: 2px;
  background: linear-gradient(90deg,transparent,var(--purple-2),var(--pink),var(--orange),transparent);
  border-radius: 0 0 2px 2px; opacity: 0.7;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px;
}

.logo { display: flex; align-items: center; gap: 12px; }

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg,var(--purple) 0%,var(--purple-3) 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(91,33,182,0.35);
}

.logo-icon svg { width: 22px; height: 22px; }

.logo-name {
  font-size: 21px; font-weight: 800;
  color: var(--text); letter-spacing: -0.6px;
}

.logo-name em {
  font-style: normal;
  background: linear-gradient(120deg,var(--purple-2) 0%,var(--pink) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

.badge {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--purple-2);
  background: var(--surface);
  border: 1px solid rgba(124,58,237,0.18);
  border-radius: 20px; padding: 5px 14px;
}

.display-grid {
  display: grid;
  grid-template-columns: 1fr 160px 1fr;
  gap: 20px; align-items: center;
  margin-bottom: 28px;
}

.dice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 28px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  box-shadow: var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,0.8);
}

.section-label {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase;
  text-align: center;
}

.dice-scene { perspective: 700px; width: 120px; height: 120px; }

.dice {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.175,0.885,0.32,1.275);
}

.face {
  position: absolute; width: 120px; height: 120px;
  background: white;
  border: 1.5px solid rgba(124,58,237,0.12);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 2px 4px rgba(255,255,255,1),inset 0 -1px 2px rgba(0,0,0,0.04);
}

.front  { transform: rotateY(0deg)    translateZ(60px); }
.back   { transform: rotateY(180deg)  translateZ(60px); }
.right  { transform: rotateY(90deg)   translateZ(60px); }
.left   { transform: rotateY(-90deg)  translateZ(60px); }
.top    { transform: rotateX(90deg)   translateZ(60px); }
.bottom { transform: rotateX(-90deg)  translateZ(60px); }

.dots {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  grid-template-rows: repeat(3,1fr);
  width: 78px; height: 78px;
}

.dot {
  width: 15px; height: 15px;
  background: linear-gradient(135deg,#2D1B69 0%,var(--purple-2) 100%);
  border-radius: 50%; margin: auto;
  box-shadow: 0 2px 6px rgba(91,33,182,0.3);
}

.dice.rolling { animation: tumble 0.08s infinite linear; }

@keyframes tumble {
  0%   { transform: rotateX(0deg)   rotateY(0deg); }
  50%  { transform: rotateX(180deg) rotateY(180deg); }
  100% { transform: rotateX(360deg) rotateY(360deg); }
}

.seg-center {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}

.seg-housing {
  background: white;
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 26px 28px;
  box-shadow: var(--shadow-sm),var(--shadow-md),inset 0 1px 0 rgba(255,255,255,0.9);
}

.seven-seg { position: relative; width: 100px; height: 182px; }

.seg {
  position: absolute;
  background: var(--seg-off);
  transition: background 0.07s ease,box-shadow 0.07s ease;
}

.seg.on {
  background: var(--seg-on);
  box-shadow: 0 0 20px var(--seg-glow),0 2px 6px rgba(248,85,37,0.22);
}

.h-seg {
  width: 64px; height: 12px;
  clip-path: polygon(7% 0%,93% 0%,100% 50%,93% 100%,7% 100%,0% 50%);
}

.v-seg {
  width: 12px; height: 68px;
  clip-path: polygon(0% 7%,50% 0%,100% 7%,100% 93%,50% 100%,0% 93%);
}

.a { top:0;      left:18px; }
.b { top:16px;   right:0;   }
.c { bottom:16px;right:0;   }
.d { bottom:0;   left:18px; }
.e { bottom:16px;left:0;    }
.f { top:16px;   left:0;    }
.g { top:84px;   left:18px; }

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 24px 22px;
  display: flex; flex-direction: column; gap: 18px;
  box-shadow: var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,0.8);
}

.info-block { display: flex; flex-direction: column; gap: 7px; align-items: center; }

.big-num {
  font-size: 68px; font-weight: 900;
  line-height: 1; letter-spacing: -4px;
  background: linear-gradient(135deg,var(--purple) 0%,var(--purple-3) 50%,var(--pink) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.5px;
}

.hdivider { border: none; border-top: 1px solid var(--border); width: 100%; }

.led-strip { display: flex; gap: 10px; }

.led-cell {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}

.led {
  width: 20px; height: 20px; border-radius: 50%;
  background: white;
  border: 2px solid rgba(124,58,237,0.15);
  transition: background 0.1s,box-shadow 0.1s,border-color 0.1s;
}

.led.on {
  background: var(--purple-2);
  border-color: var(--purple);
  box-shadow: 0 0 14px rgba(124,58,237,0.5),0 0 4px rgba(124,58,237,0.8);
}

.led-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 700;
  color: var(--muted); letter-spacing: 0.5px;
}

.clock-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}

.clk-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; color: var(--muted);
  min-width: 34px;
}

#clkCanvas {
  flex: 1; height: 38px; display: block; width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.roll-btn {
  width: 100%; padding: 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 17px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  color: white;
  background: linear-gradient(135deg,var(--purple) 0%,var(--purple-3) 45%,var(--pink) 100%);
  background-size: 200% 200%; background-position: left center;
  border: none; border-radius: 18px; cursor: pointer;
  transition: transform 0.15s,box-shadow 0.2s,background-position 0.4s;
  box-shadow: 0 6px 20px rgba(91,33,182,0.3),0 2px 6px rgba(91,33,182,0.2);
  position: relative; overflow: hidden;
  margin-bottom: 20px;
  
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.roll-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom,rgba(255,255,255,0.18) 0%,transparent 55%);
  pointer-events: none;
}

.roll-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(91,33,182,0.38);
  background-position: right center;
}

.roll-btn:active { transform: translateY(0); }

.roll-btn.rolling {
  background: linear-gradient(135deg,var(--orange) 0%,var(--amber) 100%);
  background-size: 200% 200%;
  box-shadow: 0 8px 28px rgba(248,85,37,0.4);
  animation: btnPulse 0.7s ease-in-out infinite alternate;
}

@keyframes btnPulse {
  from { box-shadow:0 6px 20px rgba(248,85,37,0.3); }
  to   { box-shadow:0 10px 40px rgba(248,85,37,0.65); }
}

.chips { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.3px;
}

.chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--orange);
  box-shadow: 0 0 4px rgba(248,85,37,0.5);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.25; }
}

@keyframes numPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.14); }
  70%  { transform: scale(0.97); }
  100% { transform: scale(1); }
}

.num-pop { animation: numPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }


/* --- RESPONSIVE MEDIA QUERIES --- */

@media (max-width: 820px) {
  body { padding: 16px; }
  .card { padding: 32px 24px; }
  .display-grid {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .info-card {
    grid-column: 1 / -1;
    flex-direction: row; 
    justify-content: space-around;
    padding: 20px;
  }
  .info-card .hdivider {
    width: 1px;
    height: 60px;
    border-top: none;
    border-left: 1px solid var(--border);
  }
}

@media (max-width: 540px) {
  body { 
    padding: 12px; /* Tighter body padding */
  }
  .card { 
    padding: 24px 16px; /* Reduced internal padding to save space */
    border-radius: 24px; 
  }
  .card::before { left: 24px; right: 24px; }
  .header { 
    flex-direction: column; 
    align-items: center;
    gap: 12px; 
    margin-bottom: 20px; 
  }
  .display-grid { 
    grid-template-columns: minmax(0, 1fr); /* CRITICAL FIX: Stops the grid from stretching */
    gap: 16px; 
  }
  .info-card {
    flex-direction: column; 
    padding: 16px 12px;
  }
  .info-card .hdivider {
    width: 100%;
    height: 1px;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  
  /* Scale down components even further for extremely narrow phones */
  .dice-scene { transform: scale(0.85); }
  .seven-seg { transform: scale(0.75); transform-origin: center; }
  .seg-housing { padding: 12px 16px; }
  
  .big-num { font-size: 52px; }
  
  .clock-row { 
    flex-direction: column; 
    align-items: stretch; 
    gap: 10px; 
  }
  .clk-label { text-align: center; }
  #clkCanvas { height: 32px; width: 100%; } /* Force canvas width */
  
  .roll-btn {
    padding: 16px;
    font-size: 15px;
  }
  .chips { gap: 6px; }
  .chip { padding: 4px 10px; font-size: 10px; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-name"><em>Digital</em> Dice</div>
    </div>
    <div class="badge">Verilog Sim</div>
  </div>

  <div class="display-grid">

    <div class="dice-card">
      <div class="section-label">3D Dice</div>
      <div class="dice-scene">
        <div id="dice" class="dice">
          <div class="face front"><div class="dots"><div class="dot" style="grid-area:2/2"></div></div></div>
          <div class="face back"><div class="dots">
            <div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div>
            <div class="dot" style="grid-area:2/1"></div><div class="dot" style="grid-area:2/3"></div>
            <div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div>
          </div></div>
          <div class="face right"><div class="dots">
            <div class="dot" style="grid-area:1/1"></div>
            <div class="dot" style="grid-area:2/2"></div>
            <div class="dot" style="grid-area:3/3"></div>
          </div></div>
          <div class="face left"><div class="dots">
            <div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div>
            <div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div>
          </div></div>
          <div class="face top"><div class="dots">
            <div class="dot" style="grid-area:1/1"></div>
            <div class="dot" style="grid-area:3/3"></div>
          </div></div>
          <div class="face bottom"><div class="dots">
            <div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div>
            <div class="dot" style="grid-area:2/2"></div>
            <div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div>
          </div></div>
        </div>
      </div>
      <div class="mono" style="font-size:10px;letter-spacing:1.5px">1 → 6 counter</div>
    </div>

    <div class="seg-center">
      <div class="section-label">7-Seg</div>
      <div class="seg-housing">
        <div class="seven-seg">
          <div id="seg-a" class="seg h-seg a"></div>
          <div id="seg-f" class="seg v-seg f"></div>
          <div id="seg-b" class="seg v-seg b"></div>
          <div id="seg-g" class="seg h-seg g"></div>
          <div id="seg-e" class="seg v-seg e"></div>
          <div id="seg-c" class="seg v-seg c"></div>
          <div id="seg-d" class="seg h-seg d"></div>
        </div>
      </div>
      <div class="mono">Active-Low</div>
    </div>

    <div class="info-card">
      <div class="info-block">
        <div class="section-label">Value</div>
        <div class="big-num" id="big-val">1</div>
      </div>

      <hr class="hdivider">

      <div class="info-block">
        <div class="section-label">Binary OUT[2:0]</div>
        <div class="led-strip">
          <div class="led-cell"><div id="bit2" class="led"></div><div class="led-sub">Q2</div></div>
          <div class="led-cell"><div id="bit1" class="led"></div><div class="led-sub">Q1</div></div>
          <div class="led-cell"><div id="bit0" class="led"></div><div class="led-sub">Q0</div></div>
        </div>
      </div>

      <hr class="hdivider">

      <div class="info-block">
        <div class="section-label">Hex</div>
        <div class="mono" id="hex-val" style="font-size:15px;color:var(--purple-2);font-weight:700">0x01</div>
      </div>
    </div>
  </div>

  <div class="clock-row">
    <div class="clk-label">CLK</div>
    <canvas id="clkCanvas"></canvas>
  </div>

  <button id="rollBtn" class="roll-btn">&#9654;&ensp;Hold to Roll</button>

  <div class="chips">
    <div class="chip"><span class="chip-dot"></span>digital_dice.v</div>
    <div class="chip">seven_segment.v</div>
    <div class="chip">Active-Low</div>
    <div class="chip">Counter</div>
  </div>

</div>

<script>
const diceEl  = document.getElementById('dice');
const rollBtn = document.getElementById('rollBtn');
const bigVal  = document.getElementById('big-val');
const hexVal  = document.getElementById('hex-val');
const canvas  = document.getElementById('clkCanvas');
const ctx     = canvas.getContext('2d');

const segs = {
  a:document.getElementById('seg-a'),b:document.getElementById('seg-b'),
  c:document.getElementById('seg-c'),d:document.getElementById('seg-d'),
  e:document.getElementById('seg-e'),f:document.getElementById('seg-f'),
  g:document.getElementById('seg-g')
};

const leds = [
  document.getElementById('bit2'),
  document.getElementById('bit1'),
  document.getElementById('bit0')
];

const SEG_MAP = {
  1:'1111001',2:'0100100',3:'0110000',
  4:'0011001',5:'0010010',6:'0000010'
};

const FACE_ROT = {
  1:'rotateX(0deg) rotateY(0deg)',
  2:'rotateX(-90deg) rotateY(0deg)',
  3:'rotateX(0deg) rotateY(-90deg)',
  4:'rotateX(0deg) rotateY(90deg)',
  5:'rotateX(90deg) rotateY(0deg)',
  6:'rotateX(0deg) rotateY(180deg)'
};

const SEG_ORDER = ['g','f','e','d','c','b','a'];

let val=1,rolling=false,rollTimer=null,clkOffset=0,clkRAF=null;

function renderUI(v,animate){
  const pat=SEG_MAP[v];
  SEG_ORDER.forEach((s,i)=>segs[s].classList.toggle('on',pat[i]==='0'));
  const b=v.toString(2).padStart(3,'0');
  leds.forEach((l,i)=>l.classList.toggle('on',b[i]==='1'));
  hexVal.textContent='0x0'+v;
  if(animate){
    bigVal.classList.remove('num-pop');
    void bigVal.offsetWidth;
    bigVal.classList.add('num-pop');
  }
  bigVal.textContent=v;
}

function resizeCanvas(){
  const dpr=devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
  ctx.scale(dpr,dpr);
  drawClock();
}

function drawClock(){
  const W=canvas.clientWidth,H=canvas.clientHeight;
  ctx.clearRect(0,0,W,H);
  const period=54,hi=7,lo=H-7;
  const col=rolling?'#F85525':'rgba(124,58,237,0.35)';
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.lineJoin='miter';ctx.lineCap='square';
  ctx.shadowColor=rolling?'#F85525':'transparent';
  ctx.shadowBlur=rolling?8:0;
  ctx.beginPath();
  let x=-(clkOffset%period),isHi=true;
  ctx.moveTo(x,isHi?hi:lo);
  while(x<W+period){
    const nx=x+period/2;
    ctx.lineTo(nx,isHi?hi:lo);
    ctx.lineTo(nx,isHi?lo:hi);
    isHi=!isHi;x=nx;
  }
  ctx.stroke();ctx.shadowBlur=0;
}

function tickClock(){
  clkOffset+=2.5;drawClock();
  if(rolling)clkRAF=requestAnimationFrame(tickClock);
}

function doRoll(){
  val=val===6?1:val+1;
  renderUI(val,false);
}

function startRoll(){
  if(rolling)return;
  rolling=true;
  rollBtn.classList.add('rolling');
  rollBtn.innerHTML='&#9646;&ensp;Release to Stop';
  diceEl.classList.add('rolling');
  rollTimer=setInterval(doRoll,60);
  tickClock();
}

function stopRoll(){
  if(!rolling)return;
  rolling=false;
  clearInterval(rollTimer);
  cancelAnimationFrame(clkRAF);
  rollBtn.classList.remove('rolling');
  rollBtn.innerHTML='&#9654;&ensp;Hold to Roll';
  diceEl.classList.remove('rolling');
  diceEl.style.transform=FACE_ROT[val];
  renderUI(val,true);
  drawClock();
}

rollBtn.addEventListener('mousedown',startRoll);
rollBtn.addEventListener('mouseup',stopRoll);
rollBtn.addEventListener('mouseleave',stopRoll);
rollBtn.addEventListener('touchstart',e=>{e.preventDefault();startRoll();},{passive:false});
rollBtn.addEventListener('touchend',stopRoll);
rollBtn.addEventListener('touchcancel',stopRoll);

window.addEventListener('resize',resizeCanvas);
requestAnimationFrame(()=>{
  resizeCanvas();
  renderUI(1,false);
  diceEl.style.transform=FACE_ROT[1];
});
</script>
</body>
</html>
